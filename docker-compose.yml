version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: blogdb_container
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: blogdb
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: blogpass
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: blogapp_container
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=blogdb
      - DB_USERNAME=bloguser
      - DB_PASSWORD=blogpass
    restart: on-failure

volumes:
  mysql_data:
